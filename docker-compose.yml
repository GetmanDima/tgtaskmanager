services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: task_manager_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/app/supervisord.conf:/etc/supervisor/supervisord.conf
      - ./storage/logs/supervisor-logs:/var/log/supervisor
    depends_on:
      - mysql
      - redis
    networks:
      - task_manager

  nginx:
    image: nginx:alpine
    container_name: task_manager_nginx
    ports:
      - '${NGINX_EXT_PORT:-8000}:80'
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - task_manager

  mysql:
    image: mysql:8.0
    container_name: task_manager_mysql
    ports:
      - '${MYSQL_EXT_PORT:-3306}:3306'
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-task_manager}
      MYSQL_USER: ${DB_USERNAME:-task_manager}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
    volumes:
      - task_manager_mysql_data:/var/lib/mysql
    networks:
      - task_manager

  redis:
    image: redis:alpine
    container_name: task_manager_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret} --appendonly yes
    ports:
      - '${REDIS_EXT_PORT:-6379}:6379'
    volumes:
      - task_manager_redis_data:/data
    networks:
      - task_manager

networks:
  task_manager:

volumes:
  task_manager_mysql_data:
  task_manager_redis_data:
