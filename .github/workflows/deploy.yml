name: deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/tgtaskmanager

            git pull origin master

            docker compose up -d
            docker exec -i task_manager_app supervisorctl stop workers:*
            docker exec -i task_manager_app supervisorctl stop queue
            docker exec -i task_manager_app composer install --no-dev --no-interaction --no-plugins --no-scripts --prefer-dist --optimize-autoloader
            docker exec -i task_manager_app php artisan migrate --force
            docker exec -i task_manager_app php artisan optimize
            docker exec -i task_manager_app supervisorctl start queue
            docker exec -i task_manager_app supervisorctl start workers:*
