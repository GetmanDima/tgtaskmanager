[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[supervisorctl]
serverurl=unix:///var/run/supervisord.sock

[unix_http_server]
file=/var/run/supervisord.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:php-fpm]
command=/usr/local/sbin/php-fpm
autostart=true
autorestart=true
stdout_logfile=/var/www/storage/logs/php-fpm.log
redirect_stderr=true

[program:queue]
command=php artisan queue:work redis --max-jobs=10000 --sleep=1 --tries=3 --timeout=60 --queue=default
autorestart=true
autostart=false
stdout_logfile=/var/www/storage/logs/queue.log
redirect_stderr=true

[program:done-tasks]
command=php artisan app:done-tasks
autorestart=true
autostart=false
stdout_logfile=/var/www/storage/logs/done_tasks.log
redirect_stderr=true

[program:create-task-notifications]
command=php artisan app:create-task-notifications
autorestart=true
autostart=false
stdout_logfile=/var/www/storage/logs/create_task_notifications.log
redirect_stderr=true

[program:send-task-notifications]
command=php artisan app:send-task-notifications
autorestart=true
autostart=false
stdout_logfile=/var/www/storage/logs/send_task_notifications.log
redirect_stderr=true

[group:workers]
programs=done-tasks,create-task-notifications,send-task-notifications
priority=1
